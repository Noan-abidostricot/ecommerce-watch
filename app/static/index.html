<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>E-commerce Watch</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #f7f8fa;
            --surface: #ffffff;
            --border: #e2e5e9;
            --text: #1a1d21;
            --text-muted: #6b7280;
            --accent: #4f46e5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        main {
            display: flex;
            gap: 1.5rem;
            padding: 1.5rem 2rem;
        }

        aside {
            flex: 0 0 260px;
        }

        .chart-area {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
        }

        aside h2 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        #productList {
            list-style: none;
        }

        #productList li {
            padding: 0.6rem 0.75rem;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.15s;
        }

        #productList li:hover {
            background: #eef0fb;
        }
    </style>
</head>

<body>

    <header>
        <h1>E-commerce Watch</h1>
        <p class="subtitle">Suivi des prix concurrents</p>
    </header>

    <main>
        <aside>
            <h2>Produits</h2>
            <ul id="productList"></ul>
        </aside>

        <section class="chart-area">
            <canvas id="priceChart"></canvas>
        </section>
    </main>

    <script>
        let chart = null;
        const labels = snapshots.map(s =>
            new Date(s.scraped_at).toLocaleString("fr-FR", {
                day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit",
            })
        );
        const prices = snapshots.map(s => s.price / 100);
        // ...
        label: "Prix (£)",
        async function loadProducts() {
            const response = await fetch("/products");
            const products = await response.json();
            const list = document.getElementById("productList");
            for (const product of products) {
                const li = document.createElement("li");
                li.textContent = product.name;
                li.style.cursor = "pointer";
                li.onclick = () => loadHistory(product.id);
                list.appendChild(li);
            }
        }

        async function loadHistory(productId) {
            const response = await fetch(`/products/${productId}/history`);
            const snapshots = await response.json();
            const labels = snapshots.map(s => s.scraped_at);
            const prices = snapshots.map(s => s.price);
            if (chart) {
                chart.destroy();
            }
            const ctx = document.getElementById("priceChart");
            chart = new Chart(ctx, {
                type: "line",
                data: {
                    labels: labels,
                    datasets: [{
                        label: "Prix (centimes)",
                        data: prices,
                    }]
                }
            });
        }

        loadProducts();
    </script>
</body>

</html>
