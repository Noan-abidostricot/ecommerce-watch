x-app-env: &app-env
  DATABASE_URL: postgresql+asyncpg://watch_user:watch_pass@postgres:5432/ecommerce_watch
  REDIS_URL: redis://redis:6379/0

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: watch_user
      POSTGRES_PASSWORD: watch_pass
      POSTGRES_DB: ecommerce_watch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watch_user -d ecommerce_watch"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=info --pool=solo
    env_file: .env
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file: .env
    environment: *app-env
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
